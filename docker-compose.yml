services:
  postgres:
    image: postgres:16
    container_name: busdb
    environment:
      POSTGRES_DB: busdb
      POSTGRES_USER: bususer
      POSTGRES_PASSWORD: buspassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: busredis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
